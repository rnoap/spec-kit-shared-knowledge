schema_version: "1.0"

extension:
  id: knowledge
  name: "Shared Knowledge"
  version: "1.1.0"
  description: "Inject cross-repo decisions, contracts, and conventions into your spec-kit workflow."
  author: "Raúl Noa Pedroso"
  repository: "https://github.com/rnoap/spec-kit-shared-knowledge"
  homepage: "https://github.com/rnoap/spec-kit-shared-knowledge"
  license: MIT

requires:
  speckit_version: ">=0.10.0"
  tools:
    - name: git
      required: true

provides:
  commands:
    - name: speckit.knowledge.configure
      file: commands/speckit.knowledge.configure.md
      description: "Initialize or edit the knowledge source configuration for the current project"
    - name: speckit.knowledge.sync
      file: commands/speckit.knowledge.sync.md
      description: "Refresh local cache for all configured knowledge sources"
    - name: speckit.knowledge.search
      file: commands/speckit.knowledge.search.md
      description: "Browse and search the knowledge corpus across all configured sources"
    - name: speckit.knowledge.status
      file: commands/speckit.knowledge.status.md
      description: "Show reachability, last-sync timestamp, item count, and cache age per source"

  config:
    - name: "knowledge.yml"
      template: "config-template.yml"
      location: ".specify/extensions/knowledge/"
      required: false

hooks:
  before_specify:
    command: speckit.knowledge.sync
    optional: true
    prompt: "Sync cross-repo knowledge sources before specifying?"
    description: "Refresh knowledge cache before spec generation so context is current"
  before_plan:
    command: speckit.knowledge.sync
    optional: true
    prompt: "Sync cross-repo knowledge sources before planning?"
    description: "Refresh knowledge cache before implementation planning"

tags:
  - "cross-repo"
  - "knowledge"
  - "context"
  - "shared-decisions"
  - "contracts"
